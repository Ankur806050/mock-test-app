<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | Mock Test App</title>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">

</head>

<body>

    <header class="navbar">

        <div class="logo">
            <h2>Mock Test App</h2>
        </div>

        <div class="nav-links">

            <a href="/profile">Profile</a>

            <button id="logoutBtn">
                Logout
            </button>

        </div>

    </header>

    <main class="dashboard">

        <section class="hero">

            <h1>Welcome 👋</h1>

            <p>
                Ready to improve your JEE Main score? Start your next mock test.
            </p>

        </section>

        <section class="mock-test-card">

            <h2>Full Length Mock Test</h2>

            <p>
                Attempt a complete JEE Main mock test with timer,
                instant evaluation and detailed analysis.
            </p>

            <a href="/mock-tests" class="start-btn">
                Start Mock Test
            </a>

        </section>

        <section class="activity">

            <h2>Recent Activity</h2>

            <div class="activity-card">

                <p>No mock tests attempted yet.</p>

            </div>

        </section>

    </main>

    <script src="/js/dashboard.js"></script>

</body>

</html>
