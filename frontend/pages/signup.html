<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | Mock Test App</title>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/auth.css">

</head>

<body>

<div class="container">

    <!-- Left Panel -->

    <section class="left-panel">

        <div class="brand">

            <h1>Mock Test App</h1>

            <p>
                Prepare smarter for <strong>JEE Main</strong> with high-quality
                mock tests and detailed performance analysis.
            </p>

        </div>

        <div class="features">

            <div class="feature">
                <span>✓</span>
                <p>Full-Length Mock Tests</p>
            </div>

            <div class="feature">
                <span>✓</span>
                <p>Performance Analytics</p>
            </div>

            <div class="feature">
                <span>✓</span>
                <p>Track Your Progress</p>
            </div>

            <div class="feature">
                <span>✓</span>
                <p>Chapter-wise Practice</p>
            </div>

        </div>

    </section>

    <!-- Right Panel -->

    <section class="right-panel">

        <h2>Create Account</h2>

        <p class="subtitle">
            Start your preparation journey today.
        </p>

        <form id="signupForm">

            <!-- Full Name -->

            <div class="input-group">

                <label for="fullName">Full Name</label>

                <input
                        type="text"
                        id="fullName"
                        name="fullName"
                        maxlength="50"
                        placeholder="Enter your full name"
                        required>

            </div>

            <!-- Email -->

            <div class="input-group">

                <label for="email">Email Address</label>

                <input
                        type="email"
                        id="email"
                        name="email"
                        maxlength="100"
                        placeholder="Enter your email"
                        required>

            </div>

            <!-- Password -->

            <div class="input-group">

                <label for="password">Password</label>

                <input
                        type="password"
                        id="password"
                        name="password"
                        minlength="8"
                        maxlength="64"
                        placeholder="Create a password"
                        required>

            </div>

            <!-- Confirm Password -->

            <div class="input-group">

                <label for="confirmPassword">
                    Confirm Password
                </label>

                <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        minlength="8"
                        maxlength="64"
                        placeholder="Confirm your password"
                        required>

            </div>

            <!-- Current Class -->

            <div class="input-group">

                <label>Current Class</label>

                <div class="radio-group">

                    <label>
                        <input
                                type="radio"
                                name="currentClass"
                                value="11"
                                required>

                        Class 11
                    </label>

                    <label>
                        <input
                                type="radio"
                                name="currentClass"
                                value="12">

                        Class 12
                    </label>

                    <label>
                        <input
                                type="radio"
                                name="currentClass"
                                value="Dropper">

                        Dropper
                    </label>

                </div>

            </div>

            <!-- Target Year -->

            <div class="input-group">

                <label for="targetYear">
                    Target Year
                </label>

                <select
                        id="targetYear"
                        name="targetYear"
                        required>

                    <option value="" selected disabled>
                        Select Target Year
                    </option>

                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>

                </select>

            </div>

            <!-- Phone -->

            <div class="input-group">

                <label for="phone">

                    Phone Number
                    <span>(Optional)</span>

                </label>

                <input
                        type="tel"
                        id="phone"
                        name="phone"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        placeholder="Enter your phone number">

            </div>

            <!-- Button -->

            <button
                    type="submit"
                    class="signup-btn">

                Create Account

            </button>

        </form>

        <p class="login-text">

            Already have an account?

            <a href="/login">

                Login

            </a>

        </p>

    </section>

</div>

<script src="/js/signup.js"></script>

</body>

</html>
