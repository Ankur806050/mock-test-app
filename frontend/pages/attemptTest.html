<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attempt Test</title>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/attemptTest.css">
</head>
<body>

    <!-- Header -->

    <header class="navbar">

        <h2 id="testTitle">
            JEE Main January 2025 Shift 1
        </h2>

        <div class="timer">

            Time Left :
            <span id="timer">
                03:00:00
            </span>

        </div>

    </header>

    <!-- Main -->

    <main class="main-container">

        <!-- Left Panel -->

        <section class="question-panel">

            <div class="question-header">

                <h3 id="questionNumber">
                    Question 1 of 90
                </h3>

            </div>

            <div class="question-box">

                <p id="questionText">

                    Question will appear here.

                </p>

            </div>

            <div class="options">

                <label class="option">
                    <input type="radio" name="answer">
                    <span>Option A</span>
                </label>

                <label class="option">
                    <input type="radio" name="answer">
                    <span>Option B</span>
                </label>

                <label class="option">
                    <input type="radio" name="answer">
                    <span>Option C</span>
                </label>

                <label class="option">
                    <input type="radio" name="answer">
                    <span>Option D</span>
                </label>

            </div>

            <div class="navigation-buttons">

                <button id="previousBtn">
                    Previous
                </button>

                <button id="clearBtn">
                    Clear Response
                </button>

                <button id="reviewBtn">
                    Mark for Review
                </button>

                <button id="nextBtn">
                    Save & Next
                </button>

            </div>

        </section>

        <!-- Right Panel -->

        <aside class="sidebar">

            <h3>Question Palette</h3>

            <div id="palette" class="palette">

                <!-- Generated by JavaScript -->

            </div>

            <div class="legend">

    <h4>Question Status</h4>

    <div class="legend-item">
        <span class="legend-box current-box"></span>
        <p>Current Question</p>
    </div>

    <div class="legend-item">
        <span class="legend-box not-visited-box"></span>
        <p>Not Visited</p>
    </div>

    <div class="legend-item">
        <span class="legend-box not-answered-box"></span>
        <p>Not Answered</p>
    </div>

    <div class="legend-item">
        <span class="legend-box answered-box"></span>
        <p>Answered</p>
    </div>

    <div class="legend-item">
        <span class="legend-box review-box"></span>
        <p>Marked for Review</p>
    </div>
    <div class="legend-item">
        <span class="legend-box answered-review-box"></span>
        <p>Answered & Marked for Review</p>
    </div>
    </div>

            <button id="submitBtn">

                Submit Test

            </button>

        </aside>
    

    </main>
    <script src="/js/notification.js"></script>
    <script src="/js/attemptTest.js"></script>

</body>
</html>
