<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/profile.css">

</head>

<body>

    <header class="navbar">

        <h1>JEE Mock Test App</h1>

        <a href="/dashboard" class="back-btn">
            ← Dashboard
        </a>

    </header>

    <main class="container">

        <div class="profile-card">

            <div class="profile-header">

                <div class="avatar">

                    👤

                </div>

                <h2 id="fullName">
                    
                </h2>

                <p id="role">
                    Student
                </p>

            </div>

            <div class="profile-details">

                <div class="detail">

                    <span>Email</span>

                    <p id="email">
                        
                    </p>

                </div>

                <div class="detail">

                    <span>Phone Number</span>

                    <p id="phone">
                        
                    </p>

                </div>

                <div class="detail">

                    <span>Current Class</span>

                    <p id="currentClass">
                        
                    </p>

                </div>

                <div class="detail">

                    <span>Target Year</span>

                    <p id="targetYear">
                        
                    </p>

                </div>

                <div class="detail">

                    <span>Joined On</span>

                    <p id="joinedOn">
                        
                    </p>

                </div>

            </div>

            <div class="buttons">

                <button
                    id="dashboardBtn"
                    onclick="window.location.href='/dashboard'">

                    Dashboard

                </button>

            </div>

        </div>

    </main>
    <script src="/js/notification.js"></script>
    <script src="/js/profile.js"></script>

</body>

</html>
