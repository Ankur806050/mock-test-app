<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Review Test</title>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/review.css">

</head>

<body>

    <!-- Header -->

    <header class="navbar">

        <h2 id="testTitle">

            Review Test

        </h2>

        <a href="/dashboard" class="dashboard-btn">

            Dashboard

        </a>

    </header>

    <!-- Main -->

    <main class="main-container">

        <!-- Left Panel -->

        <section class="question-panel">

            <div class="question-header">

                <h3 id="questionNumber">

                    Question 1 of 90

                </h3>

                <span id="questionStatus" class="status-badge">

                    Correct

                </span>

            </div>

            <div class="question-box">

                <p id="questionText">

                    Question Text

                </p>

            </div>

            <div class="options">

                <!-- Dynamic Options -->

            </div>

            <div class="answer-box">

                <div class="answer-row">

                    <span>Your Answer</span>

                    <span id="yourAnswer">-</span>

                </div>

                <div class="answer-row">

                    <span>Correct Answer</span>

                    <span id="correctAnswer">-</span>

                </div>

                <div class="answer-row">

                    <span>Marks Awarded</span>

                    <span id="marksAwarded">0</span>

                </div>

            </div>

            <div class="navigation-buttons">

                <button id="previousBtn">

                    Previous

                </button>

                <button id="nextBtn">

                    Next

                </button>

            </div>

        </section>

        <!-- Sidebar -->

        <aside class="sidebar">

            <h3>

                Question Palette

            </h3>

            <div id="palette" class="palette">

            </div>

            <div class="legend">

                <h4>

                    Review Summary

                </h4>

                <div class="legend-item">

                    <span class="legend-box current-box"></span>

                    <p>Current Question</p>

                </div>

                <div class="legend-item">

                    <span class="legend-box correct-box"></span>

                    <p>Correct</p>

                </div>

                <div class="legend-item">

                    <span class="legend-box wrong-box"></span>

                    <p>Wrong</p>

                </div>

                <div class="legend-item">

                    <span class="legend-box unanswered-box"></span>

                    <p>Not Attempted</p>

                </div>

            </div>

            <div class="statistics">

                <div class="stat">

                    <span>Score</span>

                    <strong id="score">

                        0 / 300

                    </strong>

                </div>

                <div class="stat">

                    <span>Correct</span>

                    <strong id="correctCount">

                        0

                    </strong>

                </div>

                <div class="stat">

                    <span>Wrong</span>

                    <strong id="wrongCount">

                        0

                    </strong>

                </div>

                <div class="stat">

                    <span>Unattempted</span>

                    <strong id="unattemptedCount">

                        0

                    </strong>

                </div>

            </div>

            <button id="resultBtn">

                Back to Result

            </button>

        </aside>

    </main>

    <script src="/js/review.js"></script>

</body>

</html>
